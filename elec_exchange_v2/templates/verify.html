{% extends 'base.html' %}
{% block title %}Verify Account - ElecExchange{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="form-card text-center">
                <i class="bi bi-envelope-check fs-1 mb-3" style="color:#0077b6;"></i>
                <h3 class="fw-bold mb-2">Verify Your Account</h3>
                <p class="text-muted mb-4">A verification code has been sent to your email.<br><small class="text-info">(In this demo, the code is shown on the registration screen)</small></p>
                <form method="POST">
                    <input type="hidden" name="email" value="{{ email }}">
                    <div class="mb-3">
                        <input type="text" name="code" class="form-control form-control-lg text-center fw-bold"
                               maxlength="6" placeholder="Enter 6-digit code" required style="letter-spacing:8px;font-size:22px;">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Verify Account</button>
                </form>
                <p class="mt-3 mb-0 small text-muted"><a href="/register">Back to Register</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
