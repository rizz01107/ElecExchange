{% extends 'base.html' %}
{% block title %}Register - ElecExchange{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="form-card">
                <h3 class="text-center mb-4 fw-bold" style="color:#0077b6;"><i class="bi bi-person-plus me-2"></i>Create an Account</h3>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Full Name *</label>
                        <input type="text" name="name" class="form-control" placeholder="e.g. Ali Khan" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email Address *</label>
                        <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Phone Number</label>
                        <input type="text" name="phone" class="form-control" placeholder="03001234567">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Password *</label>
                        <input type="password" name="password" class="form-control" placeholder="Minimum 6 characters" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Confirm Password *</label>
                        <input type="password" name="confirm_password" class="form-control" placeholder="Re-enter password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Create Account</button>
                </form>
                <p class="text-center mt-3 mb-0">Already have an account? <a href="/login" style="color:#0077b6;">Login here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
