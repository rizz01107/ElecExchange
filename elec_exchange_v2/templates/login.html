{% extends 'base.html' %}
{% block title %}Login - ElecExchange{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="form-card">
                <h3 class="text-center mb-4 fw-bold" style="color:#0077b6;"><i class="bi bi-box-arrow-in-right me-2"></i>Login</h3>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email Address</label>
                        <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Login</button>
                </form>
                <p class="text-center mt-3 mb-0">Don't have an account? <a href="/register" style="color:#0077b6;">Register here</a></p>
                <hr class="my-3">
                <p class="text-center text-muted small mb-0">
                    <strong>Test Accounts:</strong><br>
                    Admin: admin@elec.com / password &nbsp;|&nbsp; User: ali@gmail.com / password
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
