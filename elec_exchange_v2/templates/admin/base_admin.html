{% extends 'base.html' %}
{% block content %}
<div class="container-fluid">
<div class="row">
    <div class="col-md-2 p-0 admin-sidebar">
        <div class="p-3 text-white fw-bold border-bottom border-white border-opacity-25">
            <i class="bi bi-speedometer2 me-2"></i>Admin Panel
        </div>
        <a href="/admin" class="{{ 'active' if request.path=='/admin' else '' }}"><i class="bi bi-house me-2"></i>Dashboard</a>
        <a href="/admin/users" class="{{ 'active' if 'users' in request.path else '' }}"><i class="bi bi-people me-2"></i>Users</a>
        <a href="/admin/products" class="{{ 'active' if 'products' in request.path else '' }}"><i class="bi bi-grid me-2"></i>Products</a>
        <a href="/admin/transactions" class="{{ 'active' if 'transactions' in request.path else '' }}"><i class="bi bi-bag me-2"></i>Transactions</a>
        <a href="/"><i class="bi bi-arrow-left me-2"></i>Back to Site</a>
        <a href="/logout" style="color:#ffcdd2;"><i class="bi bi-box-arrow-right me-2"></i>Logout</a>
    </div>
    <div class="col-md-10 p-4">
        {% block admin_content %}{% endblock %}
    </div>
</div>
</div>
{% endblock %}
